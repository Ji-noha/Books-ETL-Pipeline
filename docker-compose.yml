version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: psd00
      POSTGRES_DB: booksdb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  metabase:
    image: metabase/metabase
    container_name: metabase
    ports:
      - "3001:3000"
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data: